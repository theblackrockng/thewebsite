<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Directory</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito Sans',sans-serif;background:#f0f4f0;min-height:100vh;}
:root{--font-heading:'Libre Baskerville',Georgia,serif;--font-body:'Nunito Sans',sans-serif;}
:root{
  --green:#1b5e20;--green-mid:#2e7d32;--green-light:#e8f5e9;
  --green-accent:#43a047;--gold:#f9a825;--gold-light:#fff8e1;
  --text-dark:#1a2e1a;--text-mid:#4a5e4a;--text-muted:#7a8e7a;
  --border:#d0e0d0;--inactive-bg:#fde8e8;--inactive-text:#b71c1c;
}
@keyframes spin{to{transform:rotate(360deg)}}
.view{display:none;}.view.active{display:block;}

/* ── LOADING OVERLAY ── */
#app-loading{position:fixed;inset:0;background:#f0f4f0;display:flex;align-items:center;justify-content:center;z-index:9999;}
.spinner{width:44px;height:44px;border:4px solid #c8e6c9;border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}

/* ── NAV ── */
.nav{background:var(--green);padding:0 28px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:64px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(249,168,37,0.28);}
.nav-brand{display:flex;align-items:center;cursor:pointer;justify-self:start;}
.nav-logo-wrap{width:52px;height:52px;border-radius:12px;overflow:hidden;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,0.32);transition:opacity 0.15s,box-shadow 0.15s;}
.nav-logo-wrap:hover{opacity:0.88;box-shadow:0 4px 16px rgba(0,0,0,0.36);}
.nav-logo-wrap img{width:100%;height:100%;object-fit:contain;}
.nav-tabs{display:flex;align-items:stretch;}
.nav-tab{background:transparent;border:none;color:rgba(255,255,255,0.45);padding:0 20px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font-body);transition:color 0.2s;position:relative;height:64px;display:flex;align-items:center;white-space:nowrap;letter-spacing:0.1px;}
.nav-tab:hover{color:rgba(255,255,255,0.82);}
.nav-tab.active{color:white;font-weight:700;}
.nav-tab::after{content:'';position:absolute;bottom:-1px;left:20px;right:20px;height:2px;background:var(--gold);border-radius:2px 2px 0 0;transform:scaleX(0);opacity:0;transition:transform 220ms cubic-bezier(0.25,1,0.5,1),opacity 180ms;}
.nav-tab.active::after{transform:scaleX(1);opacity:1;}
.nav-end{justify-self:end;display:flex;align-items:center;}
.btn-signout{background:none;border:none;cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:600;color:rgba(255,255,255,0.38);display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;transition:color 0.2s,background 0.15s;white-space:nowrap;}
.btn-signout:hover{color:rgba(255,255,255,0.82);background:rgba(255,255,255,0.07);}
@media(prefers-reduced-motion:reduce){.nav-tab::after,.nav-logo-wrap,.btn-signout{transition:none;}}

/* ── DASHBOARD ── */
.dash-wrap{max-width:960px;margin:0 auto;padding:24px 20px;}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.dash-title{font-size:20px;font-weight:700;color:var(--text-dark);font-family:var(--font-heading);}
.btn-add{background:var(--green);color:white;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(27,94,32,0.28);transition:background 0.15s,transform 0.1s,box-shadow 0.15s;}
.btn-add:hover{background:var(--green-mid);transform:translateY(-1px);box-shadow:0 4px 14px rgba(27,94,32,0.36);}
.btn-add:active{transform:translateY(0);box-shadow:none;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:white;border-radius:10px;padding:14px 18px;border:1px solid var(--border);}
.stat-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-num{font-size:28px;font-weight:700;color:var(--green);font-family:var(--font-heading);}
.stat-num.red{color:var(--inactive-text);}
.search-bar{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:16px;background:white;color:var(--text-dark);}
.search-bar:focus{outline:none;border-color:var(--green-accent);}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}

/* ── STAFF CARD ── */
.staff-card{background:white;border-radius:16px;overflow:hidden;position:relative;box-shadow:0 1px 3px rgba(26,46,26,0.06),0 4px 16px rgba(26,46,26,0.08);transition:transform 180ms cubic-bezier(0.25,1,0.5,1),box-shadow 180ms cubic-bezier(0.25,1,0.5,1);display:flex;flex-direction:column;}
.staff-card:hover{transform:translateY(-4px);box-shadow:0 2px 8px rgba(26,46,26,0.1),0 16px 40px rgba(27,94,32,0.18);}
.card-header{height:96px;background:linear-gradient(140deg,#1b5e20 0%,#2e7d32 100%);position:relative;flex-shrink:0;}
.card-header::after{content:'';position:absolute;top:-50px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(67,160,71,0.55) 0%,transparent 70%);pointer-events:none;}
.card-avatar-wrap{position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);width:88px;height:88px;border-radius:50%;background:white;border:3px solid #f9a825;overflow:hidden;box-shadow:0 4px 14px rgba(26,46,26,0.22);z-index:2;}
.card-avatar-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.card-avatar-initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:white;font-family:var(--font-heading);}
.status-pip{position:absolute;top:11px;right:11px;width:9px;height:9px;border-radius:50%;border:2px solid rgba(255,255,255,0.65);z-index:1;}
.status-pip.active{background:#69f0ae;}.status-pip.inactive{background:#ef5350;}
.card-body{padding:54px 16px 14px;text-align:center;flex:1;}
.card-name{font-family:var(--font-heading);font-size:15px;font-weight:700;color:var(--text-dark);line-height:1.3;margin-bottom:4px;text-wrap:balance;min-height:2.6em;display:flex;align-items:flex-start;justify-content:center;}
.card-role{font-size:12px;color:var(--text-muted);margin-bottom:9px;line-height:1.35;}
.card-dept{display:inline-block;background:var(--green-light);color:var(--green);font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:0.2px;}
.card-sep{height:1px;background:var(--border);margin:14px 0 0;}
.card-action-row{display:grid;grid-template-columns:repeat(5,1fr);}
.card-act{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 4px 9px;background:none;border:none;cursor:pointer;border-radius:0;color:var(--text-muted);transition:background 120ms ease-out,color 120ms ease-out;font-family:var(--font-body);}
.card-act:hover{background:var(--green-light);color:var(--green);}
.card-act.act-del:hover{background:#fde8e8;color:#b71c1c;}
.card-act:first-child{border-radius:0 0 0 16px;}.card-act:last-child{border-radius:0 0 16px 0;}
.ca-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ca-icon svg{display:block;width:16px;height:16px;}
.ca-label{font-size:9px;font-weight:700;line-height:1;letter-spacing:0.3px;}
@keyframes card-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.staff-card{animation:card-in 0.28s cubic-bezier(0.25,1,0.5,1) both;}
@media(prefers-reduced-motion:reduce){.staff-card,.card-act{transition:none;animation:none;}}

/* ── PROFILE VIEW ── */
.profile-wrap{max-width:680px;margin:0 auto;padding:24px 20px;}
.profile-back{display:flex;align-items:center;gap:8px;color:var(--green);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:0;background:none;border:none;}
.profile-hero{background:var(--green);border-radius:16px 16px 0 0;padding:28px 28px 24px;position:relative;overflow:hidden;display:flex;gap:20px;align-items:flex-end;}
.profile-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.04);}
.profile-logo-corner{position:absolute;top:16px;right:20px;display:flex;align-items:center;gap:8px;}
.profile-logo-corner img{height:28px;object-fit:contain;filter:brightness(0) invert(1);opacity:0.9;}
.profile-logo-corner-text{color:rgba(255,255,255,0.85);font-size:13px;font-weight:700;}
.profile-photo-wrap{width:90px;height:90px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,0.5);flex-shrink:0;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;}
.profile-photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.profile-photo-initials{font-size:30px;font-weight:700;color:white;}
.profile-meta{flex:1;}
.profile-name{font-size:22px;font-weight:700;color:white;font-family:var(--font-heading);}
.profile-role{font-size:13px;color:rgba(255,255,255,0.8);margin-top:4px;}
.profile-status{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px;}
.profile-status.active{background:rgba(255,255,255,0.2);color:white;}
.profile-status.inactive{background:rgba(183,28,28,0.3);color:#ffcdd2;}
.profile-body{background:white;border-radius:0 0 16px 16px;border:1px solid var(--border);border-top:none;}
.profile-section{padding:20px 24px;border-bottom:1px solid var(--border);}
.profile-section:last-child{border-bottom:none;}
.section-label{font-size:13px;font-weight:700;color:var(--text-dark);margin-bottom:14px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;}
.info-row:last-child{border-bottom:none;}
.info-key{font-size:13px;color:var(--text-muted);}
.info-val{font-size:13px;font-weight:600;color:var(--text-dark);text-align:right;}
.info-val a{color:var(--green);text-decoration:none;}
.info-val a:hover{text-decoration:underline;}
.bio-text{font-size:14px;color:var(--text-mid);line-height:1.7;}
.inactive-banner{background:var(--inactive-bg);border:1px solid var(--inactive-text);padding:14px 20px;margin:16px 24px 0;border-radius:8px;font-size:13px;color:var(--inactive-text);font-weight:600;}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.62);display:none;align-items:center;justify-content:center;z-index:300;padding:16px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal-box{background:white;border-radius:16px;padding:28px;max-width:340px;width:90%;text-align:center;}
.modal-title{font-size:17px;font-weight:700;color:var(--text-dark);margin-bottom:4px;font-family:var(--font-heading);}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;}
.qr-canvas-wrap{display:flex;justify-content:center;margin-bottom:14px;}
#styled-qr-canvas{border-radius:20px;width:260px;height:260px;box-shadow:0 4px 20px rgba(0,0,0,0.12);}
.qr-url{font-size:11px;color:var(--text-muted);word-break:break-all;margin-bottom:16px;background:#f5f5f5;padding:8px;border-radius:6px;}
.modal-btns{display:flex;gap:10px;}
.btn-dl{flex:1;background:var(--green);color:white;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-close-m{flex:1;background:#f5f5f5;color:var(--text-dark);border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}

/* ── ID CARD MODAL ── */
.id-modal-box{background:white;border-radius:16px;padding:22px;max-width:360px;width:100%;text-align:center;}
.id-modal-name{font-size:15px;font-weight:700;color:var(--text-dark);margin-bottom:4px;font-family:var(--font-heading);}
.id-modal-role{font-size:12px;color:var(--text-muted);margin-bottom:16px;}
.id-card-img-wrap{position:relative;display:inline-block;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2);line-height:0;}
.id-card-img-wrap img{width:100%;max-width:260px;max-height:60vh;object-fit:contain;border-radius:14px;display:block;}
.id-card-img-replace{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.55);color:white;border:none;border-radius:8px;font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;backdrop-filter:blur(4px);transition:background 0.2s;}
.id-card-img-replace:hover{background:rgba(0,0,0,0.75);}
.id-card-empty{border:2px dashed var(--border);border-radius:14px;padding:32px 20px;text-align:center;background:#fafafa;cursor:pointer;transition:all 0.2s;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.id-card-empty:hover{border-color:var(--green-accent);background:var(--green-light);}
.id-card-empty-icon{font-size:36px;}
.id-card-empty-text{font-size:13px;font-weight:600;color:var(--text-dark);}
.id-card-empty-sub{font-size:11px;color:var(--text-muted);}
.id-card-actions{display:flex;gap:8px;margin-top:14px;}
.btn-id-action{flex:1;padding:9px 6px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all 0.15s;}
.btn-upload-card{background:var(--green);color:white;border-color:var(--green);}
.btn-upload-card:hover{background:var(--green-mid);}
.btn-download-card{background:var(--green-light);color:var(--green);border-color:#c8e6c9;}
.btn-download-card:hover{background:#c8e6c9;}
.btn-print-card{background:var(--gold-light);color:#795500;border-color:#ffe082;}
.btn-print-card:hover{background:#ffe082;}
.btn-close-card{background:#f5f5f5;color:var(--text-dark);border-color:#e0e0e0;}
.btn-close-card:hover{background:#e0e0e0;}

/* ── ADD STAFF MODAL ── */
.add-modal-inner{background:white;border-radius:16px;padding:24px;max-width:520px;width:95%;max-height:92vh;overflow-y:auto;text-align:left;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:12px;font-weight:600;color:var(--text-mid);}
.form-input,.form-select,.form-textarea{padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--text-dark);background:white;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--green-accent);}
.form-input[readonly]{background:#f5f5f5;color:var(--text-muted);cursor:not-allowed;}
.form-textarea{resize:vertical;min-height:80px;}
.upload-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.upload-box{border:2px dashed var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fafafa;}
.upload-box:hover{border-color:var(--green-accent);background:var(--green-light);}
.upload-box-label{font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
.upload-box-body{display:flex;flex-direction:column;align-items:center;gap:4px;}
.upload-icon-sm{font-size:22px;}
.upload-hint{font-size:10px;color:var(--text-muted);}
.btn-save{width:100%;background:var(--green);color:white;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;}
.btn-save:hover{background:var(--green-mid);}
.btn-save:disabled{background:#a5d6a7;cursor:not-allowed;}
.btn-cancel{width:100%;background:#f5f5f5;color:var(--text-dark);border:none;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;}

/* ── CARD BACK PANEL ── */
.card-back-panel{background:white;border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.card-back-preview{flex-shrink:0;width:72px;height:110px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:#f5f5f5;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.card-back-preview:hover{border-color:var(--green-accent);}
.card-back-preview img{width:100%;height:100%;object-fit:cover;}
.card-back-preview-empty{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;}
.card-back-preview-empty span{font-size:20px;}
.card-back-preview-empty small{font-size:9px;color:var(--text-muted);text-align:center;line-height:1.3;}
.card-back-info{flex:1;}
.card-back-title{font-size:14px;font-weight:700;color:var(--text-dark);font-family:var(--font-heading);margin-bottom:3px;}
.card-back-sub{font-size:12px;color:var(--text-muted);line-height:1.5;}
.card-back-actions{display:flex;gap:8px;flex-shrink:0;}
.btn-back{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;white-space:nowrap;}
.btn-back-upload{background:var(--green);color:white;border-color:var(--green);}
.btn-back-upload:hover{background:var(--green-mid);}
.btn-back-dl{background:var(--green-light);color:var(--green);border-color:#c8e6c9;}
.btn-back-dl:hover{background:#c8e6c9;}
.btn-back-print{background:var(--gold-light);color:#795500;border-color:#ffe082;}
.btn-back-print:hover{background:#ffe082;}

/* ── FILTER ROW ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text-mid);transition:all 0.15s;font-family:'Nunito Sans',sans-serif;}
.filter-chip:hover{border-color:var(--green-accent);color:var(--green);}
.filter-chip.active{background:var(--green);color:white;border-color:var(--green);}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1b5e20;color:white;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,0.18);opacity:0;transition:all 0.3s;pointer-events:none;z-index:9998;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#b71c1c;}

/* ── MOBILE ── */
@media(max-width:600px){
  .nav{padding:0 16px;}
  .nav-tab{padding:0 12px;font-size:12px;}
  .dash-wrap{padding:16px 12px;}
  .stats-row{grid-template-columns:1fr;gap:8px;}
  .staff-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .ca-label{display:none;}
  .card-act{padding:11px 4px;}
  .modal-box{width:96%!important;max-width:100%!important;padding:20px 16px!important;max-height:92vh;overflow-y:auto;}
  .form-row{grid-template-columns:1fr!important;}
  .profile-hero{flex-direction:column;align-items:center;text-align:center;padding:20px;}
  .profile-wrap{padding:12px 12px 40px;}
  .otp-box{width:38px!important;height:46px!important;font-size:18px!important;}
}
@media(max-width:380px){
  .staff-grid{grid-template-columns:1fr;}
}

/* ── PRINT ── */
@media print{
  body>nav,#view-dashboard,#view-profile,#qr-modal,#add-modal,
  .id-modal-name,.id-modal-role,.id-card-img-replace,.id-card-actions{display:none!important;}
  .modal-overlay{position:static!important;background:none!important;padding:0!important;display:flex!important;justify-content:center;align-items:center;min-height:100vh;}
  .id-modal-box{box-shadow:none!important;padding:0!important;}
  .id-card-img-wrap img{max-height:none!important;max-width:100%!important;}
}
</style>
</head>
<body>

<div id="app-loading">
  <div style="text-align:center">
    <div class="spinner"></div>
    <div style="color:var(--green);font-weight:600;font-size:14px">Loading…</div>
  </div>
</div>

<nav class="nav">
  <div class="nav-brand" onclick="showView('dashboard')">
    <div class="nav-logo-wrap" id="nav-logo-wrap">
      <img src="logo.png" alt="" id="nav-logo-img">
    </div>
  </div>
  <div class="nav-tabs">

<script>
const { createClient } = supabase;
const sb = createClient(DIRECTORY_CONFIG.supabaseUrl, DIRECTORY_CONFIG.supabaseKey);

const BASE_URL = window.location.origin + '/staff-directory/';
const COLORS = ['#1b5e20','#0277bd','#6a1b9a','#ad1457','#e65100','#00695c','#283593','#4e342e'];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let staff = [];
let currentQRStaff = null, currentIDStaff = null;
let pendingPhotoFile = null, pendingIDCardFile = null;
let editingStaffId = null;
let cardBack = 'id-cards/card-back.png';
let statusFilter = 'all';

/* ── APPLY CONFIG ── */
document.title = DIRECTORY_CONFIG.brandName + ' — ' + DIRECTORY_CONFIG.productName;
document.getElementById('nav-logo-wrap').title = DIRECTORY_CONFIG.brandName;
document.getElementById('nav-logo-img').alt = DIRECTORY_CONFIG.brandName;
document.getElementById('nav-logo-img').onerror = function() { this.style.display = 'none'; };

function setStatusFilter(val) {
  statusFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === val));
  renderCards();
}

/* ── INIT ── */
async function init() {
  // Use the existing console Supabase Auth session — no separate login
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.replace('/login'); return; }

  // Role check via staff_profiles (consistent with the admin console)
  const { data: profile } = await sb.from('staff_profiles').select('role').eq('id', session.user.id).maybeSingle();
  const role = profile?.role || session.user.user_metadata?.role || '';
  const allowed = ['super_admin', 'hr_admin'].includes(role);
  if (!allowed) {
    window.location.replace('/?access_denied=staff_directory');
    return;
  }

  document.getElementById('app-loading').style.display = 'none';
  await loadStaff();
  initCardBack();
  const p = new URLSearchParams(window.location.search).get('staff');
  if (p) window.location.replace('/staff-directory/profile.html?staff=' + p);
}

/* ── LOAD STAFF ── */
async function loadStaff() {
  const { data, error } = await sb.from('staff').select('*').order('id');
  if (error) { showToast('Could not load staff: ' + error.message, 5000, true); return; }
  staff = data || [];
  updateStats();
  renderCards();
}

/* ── STORAGE UPLOAD ── */
async function uploadToStorage(bucket, path, file) {
  const ext = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'png';
  const fullPath = path + '.' + ext;
  const { error } = await sb.storage.from(bucket).upload(fullPath, file, {
    upsert: true, contentType: file.type
  });
  if (error) throw error;
  const { data } = sb.storage.from(bucket).getPublicUrl(fullPath);
  return data.publicUrl;
}

/* ── CARD BACK ── */
function initCardBack() {
  const img = new Image();
  img.onload = () => applyCardBack('id-cards/card-back.png');
  img.onerror = () => {};
  img.src = 'id-cards/card-back.png';
}
function handleCardBackUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => applyCardBack(ev.target.result);
  r.readAsDataURL(f);
  e.target.value = '';
}
function applyCardBack(src) {
  cardBack = src;
  document.getElementById('card-back-thumb').innerHTML = `<img src="${src}" alt="Card Back">`;
  document.getElementById('card-back-sub').textContent = 'Back uploaded. Ready to download or print.';
  const dl = document.getElementById('btn-back-dl'), pr = document.getElementById('btn-back-print');
  dl.style.opacity = '1'; dl.style.pointerEvents = 'auto';
  pr.style.opacity = '1'; pr.style.pointerEvents = 'auto';
}
function downloadCardBack() {
  if (!cardBack) return;
  const a = document.createElement('a');
  a.href = cardBack; a.download = 'id-card-back.png'; a.target = '_blank'; a.click();
}
function printCardBack() {
  if (!cardBack) return;
  const w = window.open('', '_blank', 'width=500,height=750');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>*{margin:0;padding:0;}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#eee;}
    img{max-width:340px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.25);}
    @media print{body{background:white;}}</style></head>
    <body><img src="${cardBack}"><script>window.onload=function(){window.print();}<\/script></body></html>`);
  w.document.close();
}

/* ── HELPERS ── */
function initials(s) { return ((s.firstname||'?')[0] + (s.lastname||'?')[0]).toUpperCase(); }
function avatarColor(id) { const n = (id||'').split('').reduce((a,c) => a + c.charCodeAt(0), 0); return COLORS[n % COLORS.length]; }
function staffURL(s) { return BASE_URL + 'profile.html?staff=' + s.id; }
function fmtDate(d) { if (!d) return 'N/A'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }

/* ── STATS ── */
function updateStats() {
  const a = staff.filter(s => s.status === 'active').length;
  document.getElementById('stat-total').textContent = staff.length;
  document.getElementById('stat-active').textContent = a;
  document.getElementById('stat-inactive').textContent = staff.length - a;
}

/* ── ICONS ── */
const ICONS={
  profile:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  qr:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="15" y="15" width="3" height="3" rx="0.5"/><line x1="15" y1="19" x2="18" y2="19"/><line x1="19" y1="15" x2="19" y2="18"/></svg>`,
  id:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="8.5" cy="12" r="2.5"/><path d="M14 9h5M14 12h4M14 15h3"/></svg>`,
  edit:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`,
  del:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14Z"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`
};

/* ── CARDS ── */
function renderCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = staff.filter(s => {
    const matchesSearch = (s.firstname+' '+s.lastname+' '+s.role+' '+s.dept).toLowerCase().includes(q);
    const matchesStatus = statusFilter === 'all' || s.status === statusFilter;
    return matchesSearch && matchesStatus;
  });
  const grid = document.getElementById('staff-grid');
  if (!list.length) { grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px">No staff found.</p>'; return; }
  grid.innerHTML = list.map(s => {
    const ini = initials(s), col = avatarColor(s.id);
    const photoSrc = s.photo_url ? (s.photo_url + (s._cacheBust ? '?t=' + s._cacheBust : '')) : null;
    const avatarInner = photoSrc
      ? `<img src="${photoSrc}" alt="${esc(s.firstname)}" onerror="this.outerHTML='<div class=card-avatar-initials style=background:${col}>${ini}</div>'">`
      : `<div class="card-avatar-initials" style="background:${col}">${ini}</div>`;
    return `<div class="staff-card">
      <div class="card-header">
        <div class="status-pip ${s.status}" title="${s.status === 'active' ? 'Active' : 'Inactive'}"><span class="sr-only">${s.status === 'active' ? 'Active' : 'Inactive'}</span></div>
        <div class="card-avatar-wrap">${avatarInner}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(s.firstname)} ${esc(s.lastname)}</div>
        <div class="card-role">${esc(s.role)}</div>
        <div class="card-dept">${esc(s.dept)}</div>
      </div>
      <div class="card-sep"></div>
      <div class="card-action-row" role="group" aria-label="Actions for ${esc(s.firstname)} ${esc(s.lastname)}">
        <button class="card-act" onclick="viewProfile('${esc(s.id)}')" aria-label="View profile"><span class="ca-icon">${ICONS.profile}</span><span class="ca-label">Profile</span></button>
        <button class="card-act" onclick="openQR('${esc(s.id)}')" aria-label="View QR code"><span class="ca-icon">${ICONS.qr}</span><span class="ca-label">QR</span></button>
        <button class="card-act" onclick="openIDCard('${esc(s.id)}')" aria-label="${s.id_card_url ? 'View ID card' : 'Add ID card'}"><span class="ca-icon">${ICONS.id}</span><span class="ca-label">${s.id_card_url ? 'ID Card' : '+ ID'}</span></button>
        <button class="card-act" onclick="editStaff('${esc(s.id)}')" aria-label="Edit ${esc(s.firstname)} ${esc(s.lastname)}"><span class="ca-icon">${ICONS.edit}</span><span class="ca-label">Edit</span></button>
        <button class="card-act act-del" onclick="deleteStaff('${esc(s.id)}')" aria-label="Delete ${esc(s.firstname)} ${esc(s.lastname)}"><span class="ca-icon">${ICONS.del}</span><span class="ca-label">Delete</span></button>
      </div>
    </div>`;
  }).join('');
}

/* ── PROFILE ── */
function viewProfile(id) {
  const s = staff.find(x => x.id === id); if (!s) return;
  const active = s.status === 'active';
  const ini = initials(s);
  const photoHTML = s.photo_url

    : `<div class="profile-photo-initials">${ini}</div>`;

  document.getElementById('profile-edit-btn').onclick = () => editStaff(s.id);
  document.getElementById('profile-delete-btn').onclick = () => deleteStaff(s.id);
  document.getElementById('profile-content').innerHTML = `
    <div>
      <div class="profile-hero">
        <div class="profile-logo-corner">
          <img src="logo.png" alt="${esc(DIRECTORY_CONFIG.brandName)}"
               onerror="this.parentElement.innerHTML='<span class=profile-logo-corner-text>${esc(DIRECTORY_CONFIG.logoFallback)} ${esc(DIRECTORY_CONFIG.brandName)}</span>'">
        </div>
        <div class="profile-photo-wrap">${photoHTML}</div>
        <div class="profile-meta">
          <div class="profile-name">${esc(s.firstname)} ${esc(s.lastname)}</div>
          <div class="profile-role">${esc(s.role)} · ${esc(s.dept)}</div>
          <span class="profile-status ${s.status}">
            <span style="width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block"></span>
            ${active ? 'Active Employee' : 'No Longer Active'}
          </span>
        </div>
      </div>
      <div class="profile-body">
        ${!active ? `<div class="inactive-banner">⚠ This person is no longer an active employee of ${esc(DIRECTORY_CONFIG.brandName)}.</div>` : ''}
        <div class="profile-section">
          <div class="section-label">About</div>
          <p class="bio-text">${esc(s.bio) || 'No bio available.'}</p>
        </div>
        <div class="profile-section">
          <div class="section-label">Details</div>
          <div class="info-row"><span class="info-key">Employee ID</span><span class="info-val">${esc(s.id)}</span></div>
          <div class="info-row"><span class="info-key">Department</span><span class="info-val">${esc(s.dept)}</span></div>
          <div class="info-row"><span class="info-key">Joined</span><span class="info-val">${fmtDate(s.join_date)}</span></div>
          <div class="info-row"><span class="info-key">Status</span><span class="info-val">${active ? '✅ Active' : '❌ Inactive'}</span></div>
        </div>

          <div class="info-row"><span class="info-key">Email</span><span class="info-val"><a href="mailto:${esc(s.email)}">${esc(s.email)}</a></span></div>
          <div class="info-row"><span class="info-key">Phone</span><span class="info-val"><a href="tel:${s.phone.replace(/\s/g,'')}">${esc(s.phone)}</a></span></div>
        </div>
        <div class="profile-section" style="background:#f9fbf9;border-radius:0 0 16px 16px">
          <div style="display:flex;align-items:center;gap:12px">
            <img src="logo.png" style="height:26px;object-fit:contain"
                 onerror="this.outerHTML='<div style=background:var(--gold);color:var(--green);width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900>${esc(DIRECTORY_CONFIG.logoFallback)}</div>'">
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--green);font-family:'Libre Baskerville',serif">${esc(DIRECTORY_CONFIG.brandName)}</div>
              <div style="font-size:11px;color:var(--text-muted)">${esc(DIRECTORY_CONFIG.website)} · ${esc(DIRECTORY_CONFIG.email)}</div>
              <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${esc(DIRECTORY_CONFIG.address)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  showView('profile');
}

/* ── ID CARD ── */
function openIDCard(id) {
  const s = staff.find(x => x.id === id); if (!s) return;
  currentIDStaff = s;
  document.getElementById('id-modal-name').textContent = s.firstname + ' ' + s.lastname;
  document.getElementById('id-modal-role').textContent = s.role + ' · ' + s.dept;
  refreshIDCardDisplay();
  document.getElementById('id-modal').classList.add('open');
}
function refreshIDCardDisplay() {
  const s = currentIDStaff; if (!s) return;
  const display = document.getElementById('id-card-display');
  const dlBtn = document.getElementById('btn-download-id');
  if (s.id_card_url) {
    const src = s.id_card_url + '?t=' + (s._cacheBust || '');
    display.innerHTML = `
      <div class="id-card-img-wrap">
        <img src="${src}" alt="ID Card — ${s.firstname} ${s.lastname}"
             onerror="this.parentElement.innerHTML='<div style=padding:20px;color:#b71c1c;font-size:13px>Image not found. Please re-upload.</div>'">
        <button class="id-card-img-replace" onclick="document.getElementById('id-card-file-input').click()">✎ Replace</button>
      </div>`;
    dlBtn.style.opacity = '1'; dlBtn.style.pointerEvents = 'auto';
  } else {
    display.innerHTML = `
      <div class="id-card-empty" onclick="document.getElementById('id-card-file-input').click()">
        <div class="id-card-empty-icon">🪪</div>
        <div class="id-card-empty-text">No ID card uploaded yet</div>
        <div class="id-card-empty-sub">Click to upload the designed ID card image</div>
      </div>`;
    dlBtn.style.opacity = '0.4'; dlBtn.style.pointerEvents = 'none';
  }
}
async function handleIDCardUpload(e) {
  const f = e.target.files[0]; if (!f || !currentIDStaff) return;
  if (f.size > 5 * 1024 * 1024) { showToast('ID card too large. Max 5MB.', 3000, true); e.target.value=''; return; }
  e.target.value = '';
  const dlBtn = document.getElementById('btn-download-id');
  dlBtn.disabled = true; dlBtn.textContent = 'Uploading…';
  try {
    const oldUrl = currentIDStaff.id_card_url;
    const url = await uploadToStorage('staff-id-cards', currentIDStaff.id + '-card', f);
    if (oldUrl && oldUrl !== url) {
      const oldPath = oldUrl.split('/staff-id-cards/')[1]?.split('?')[0];
      if (oldPath) await sb.storage.from('staff-id-cards').remove([oldPath]);
    }
    const { error } = await sb.from('staff').update({ id_card_url: url }).eq('id', currentIDStaff.id);
    if (error) throw error;
    currentIDStaff.id_card_url = url;
    currentIDStaff._cacheBust = Date.now();
    const s = staff.find(x => x.id === currentIDStaff.id);
    if (s) { s.id_card_url = url; s._cacheBust = currentIDStaff._cacheBust; }
    refreshIDCardDisplay();
    renderCards();
    showToast('ID card replaced ✓');
  } catch(err) {
    showToast('Upload failed: ' + err.message, 5000, true);
  } finally {
    dlBtn.disabled = false; dlBtn.textContent = '⬇ Download';
  }
}
function downloadIDCard() {
  const s = currentIDStaff; if (!s || !s.id_card_url) return;
  const a = document.createElement('a');
  a.href = s.id_card_url; a.download = s.id + '-id-card.png'; a.target = '_blank'; a.click();
}

/* ── STYLED QR ── */
const LOGO_SVG_FALLBACK = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1b5e20"/>
  <text x="50" y="68" font-size="52" text-anchor="middle" fill="#f9a825" font-family="sans-serif" font-weight="900">${DIRECTORY_CONFIG.logoFallback}</text>
</svg>`;
function fillRR(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill();
}
function drawStyledQR(canvas, url) {
  const qr = qrcode(0,'H'); qr.addData(url); qr.make();
  const mc = qr.getModuleCount(), pad = 2, S = 520;
  canvas.width = S; canvas.height = S;
  const cell = S / (mc + pad * 2);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,S,S);
  function isFinder(r,c){return(r<7&&c<7)||(r<7&&c>=mc-7)||(r>=mc-7&&c<7);}
  ctx.fillStyle = '#111';
  const dr = cell * 0.42;
  for (let r=0; r<mc; r++) for (let c=0; c<mc; c++) {
    if (isFinder(r,c)) continue;
    if (qr.isDark(r,c)) {
      const cx=(c+pad+0.5)*cell, cy=(r+pad+0.5)*cell;
      ctx.beginPath(); ctx.arc(cx,cy,dr,0,Math.PI*2); ctx.fill();
    }
  }
  [{r:0,c:0},{r:0,c:mc-7},{r:mc-7,c:0}].forEach(({r,c})=>{
    const x=(c+pad)*cell,y=(r+pad)*cell,sz=7*cell,cr=cell*1.1;
    ctx.fillStyle='#111';fillRR(ctx,x,y,sz,sz,cr);
    ctx.fillStyle='#fff';fillRR(ctx,x+cell,y+cell,sz-cell*2,sz-cell*2,cr*0.55);
    ctx.fillStyle='#111';fillRR(ctx,x+cell*2,y+cell*2,sz-cell*4,sz-cell*4,cr*0.35);
  });
  const ls=S*0.19, lx=(S-ls)/2, ly=(S-ls)/2;
  ctx.fillStyle='#fff'; fillRR(ctx,lx-10,ly-10,ls+20,ls+20,14);
  const img = new Image();
  img.onload = () => ctx.drawImage(img,lx,ly,ls,ls);
  img.onerror = () => {
    const fb = new Image();
    fb.onload = () => ctx.drawImage(fb,lx,ly,ls,ls);
    fb.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(LOGO_SVG_FALLBACK);
  };
  img.src = 'logo.png';
}
function openQR(id) {
  const s = staff.find(x => x.id === id); if (!s) return;
  currentQRStaff = s;
  document.getElementById('qr-staff-name').textContent = s.firstname + ' ' + s.lastname;
  const url = staffURL(s);
  document.getElementById('qr-url-text').textContent = url;
  drawStyledQR(document.getElementById('styled-qr-canvas'), url);
  document.getElementById('qr-modal').classList.add('open');
}
function downloadQR() {
  const canvas = document.getElementById('styled-qr-canvas'); if (!canvas) return;
  const a = document.createElement('a');
  a.download = (currentQRStaff ? currentQRStaff.id : 'staff') + '-qr.png';
  a.href = canvas.toDataURL('image/png'); a.click();
}

/* ── PHOTO/ID CARD FILE SELECTION ── */
function handlePhotoUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  if (f.size > 5 * 1024 * 1024) { showToast('Photo too large. Max 5MB.', 3000, true); e.target.value=''; return; }
  pendingPhotoFile = f;
  const r = new FileReader();
  r.onload = ev => { document.getElementById('photo-placeholder').innerHTML =
    `<img src="${ev.target.result}" style="width:60px;height:60px;border-radius:8px;object-fit:cover;border:2px solid var(--border)">
     <div class="upload-hint" style="color:var(--green);font-weight:600">Ready ✓</div>`; };
  r.readAsDataURL(f);
}
function handleIDCardAddUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  if (f.size > 5 * 1024 * 1024) { showToast('ID card too large. Max 5MB.', 3000, true); e.target.value=''; return; }
  pendingIDCardFile = f;
  const r = new FileReader();
  r.onload = ev => { document.getElementById('id-card-add-placeholder').innerHTML =
    `<img src="${ev.target.result}" style="width:44px;height:66px;border-radius:6px;object-fit:cover;border:2px solid var(--border)">
     <div class="upload-hint" style="color:var(--green);font-weight:600">Ready ✓</div>`; };
  r.readAsDataURL(f);
}

/* ── ADD / EDIT MODAL ── */
function openAddModal() {
  editingStaffId = null; pendingPhotoFile = null; pendingIDCardFile = null;
  document.getElementById('add-modal-title').textContent = 'Add New Staff';
  document.getElementById('btn-save-staff').textContent = 'Save Staff Member';
  document.getElementById('photo-placeholder').innerHTML = `<div class="upload-icon-sm">📷</div><div class="upload-hint">JPG or PNG</div>`;
  document.getElementById('id-card-add-placeholder').innerHTML = `<div class="upload-icon-sm">🪪</div><div class="upload-hint">Upload designed card</div>`;
  ['f-fn','f-ln','f-role','f-dept','f-email','f-phone','f-empid','f-join','f-bio'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'active';
  document.getElementById('f-empid').removeAttribute('readonly');
  document.getElementById('add-modal').classList.add('open');
}
function editStaff(id) {
  const s = staff.find(x => x.id === id); if (!s) return;
  editingStaffId = id; pendingPhotoFile = null; pendingIDCardFile = null;
  document.getElementById('add-modal-title').textContent = 'Edit Staff — ' + s.firstname + ' ' + s.lastname;
  document.getElementById('btn-save-staff').textContent = 'Save Changes';
  document.getElementById('f-fn').value = s.firstname || '';
  document.getElementById('f-ln').value = s.lastname || '';
  document.getElementById('f-role').value = s.role || '';
  document.getElementById('f-dept').value = s.dept || '';
  document.getElementById('f-email').value = s.email || '';
  document.getElementById('f-phone').value = s.phone || '';
  document.getElementById('f-empid').value = s.id || '';
  document.getElementById('f-empid').setAttribute('readonly','readonly');
  document.getElementById('f-join').value = s.join_date || '';
  document.getElementById('f-status').value = s.status || 'active';
  document.getElementById('f-bio').value = s.bio || '';
  document.getElementById('photo-placeholder').innerHTML = s.photo_url
    ? `<img src="${s.photo_url}" style="width:60px;height:60px;border-radius:8px;object-fit:cover;border:2px solid var(--border)" onerror="this.outerHTML='<div class=upload-icon-sm>📷</div>'"><div class="upload-hint" style="color:var(--green-mid);font-weight:600">Current photo</div>`
    : `<div class="upload-icon-sm">📷</div><div class="upload-hint">JPG or PNG</div>`;
  document.getElementById('id-card-add-placeholder').innerHTML = s.id_card_url
    ? `<img src="${s.id_card_url}" style="width:44px;height:66px;border-radius:6px;object-fit:cover;border:2px solid var(--border)" onerror="this.outerHTML='<div class=upload-icon-sm>🪪</div>'"><div class="upload-hint" style="color:var(--green-mid);font-weight:600">Current card</div>`
    : `<div class="upload-icon-sm">🪪</div><div class="upload-hint">Upload designed card</div>`;
  document.getElementById('add-modal').classList.add('open');
}

async function saveStaff() {
  const fn = document.getElementById('f-fn').value.trim();
  const ln = document.getElementById('f-ln').value.trim();
  if (!fn || !ln) { alert('Please enter first and last name.'); return; }
  const btn = document.getElementById('btn-save-staff');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const isEdit = !!editingStaffId;
    const existing = isEdit ? staff.find(x => x.id === editingStaffId) : null;
    const empid = isEdit ? editingStaffId : (document.getElementById('f-empid').value.trim() || 'EMP-' + String(staff.length + 1).padStart(3,'0'));
    let photo_url = existing?.photo_url || null;
    let id_card_url = existing?.id_card_url || null;
    if (pendingPhotoFile) photo_url = await uploadToStorage('staff-photos', empid, pendingPhotoFile);
    if (pendingIDCardFile) id_card_url = await uploadToStorage('staff-id-cards', empid + '-card', pendingIDCardFile);
    const record = {
      firstname: fn, lastname: ln,
      role: document.getElementById('f-role').value.trim() || 'Staff',
      dept: document.getElementById('f-dept').value.trim() || 'General',
      email: document.getElementById('f-email').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      join_date: document.getElementById('f-join').value || null,
      status: document.getElementById('f-status').value,
      bio: document.getElementById('f-bio').value.trim(),
      photo_url, id_card_url
    };
    if (isEdit) {
      const { error } = await sb.from('staff').update(record).eq('id', empid);
      if (error) throw error;
      const idx = staff.findIndex(x => x.id === empid);
      if (idx >= 0) staff[idx] = { ...staff[idx], ...record };
    } else {
      const { error } = await sb.from('staff').insert({ id: empid, ...record });
      if (error) throw error;
      staff.push({ id: empid, ...record });
    }
    closeModal('add-modal');
    editingStaffId = null; pendingPhotoFile = null; pendingIDCardFile = null;
    updateStats(); renderCards();
    showToast(isEdit ? '✓ Staff updated' : '✓ Staff added');
    if (isEdit && document.getElementById('view-profile').classList.contains('active')) viewProfile(empid);
  } catch(err) {
    showToast('Error: ' + err.message, 5000, true);
  } finally {
    btn.disabled = false; btn.textContent = editingStaffId ? 'Save Changes' : 'Save Staff Member';
  }
}

async function deleteStaff(id) {
  const s = staff.find(x => x.id === id); if (!s) return;
  if (!confirm(`Delete ${esc(s.firstname)} ${esc(s.lastname)}?\n\nThis cannot be undone.`)) return;
  const { error } = await sb.from('staff').delete().eq('id', id);
  if (error) { showToast('Delete failed: ' + error.message, 5000, true); return; }
  staff = staff.filter(x => x.id !== id);
  updateStats(); renderCards();
  showToast('Staff member deleted');
  if (document.getElementById('view-profile').classList.contains('active')) showView('dashboard');
}

/* ── TOAST ── */
function showToast(msg, duration=3000, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}

/* ── NAV / MODAL / VIEW ── */
async function logout() {
  await sb.auth.signOut();
  window.location.href = '/login';
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (name === 'dashboard') {
    document.getElementById('view-dashboard').classList.add('active');
    document.querySelectorAll('.nav-tab')[0].classList.add('active');
  } else {
    document.getElementById('view-profile').classList.add('active');
    document.querySelectorAll('.nav-tab')[1].classList.add('active');
    if (name === 'profile-demo' && staff.length) viewProfile(staff[0].id);
  }
}
['qr-modal','id-modal','add-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) { if (e.target === this) closeModal(id); });
});

document.addEventListener('DOMContentLoaded', init);
</script>
